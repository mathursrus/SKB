name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: skb-waitlist
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://skb-waitlist.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Prepare deploy package
        run: |
          mkdir -p deploy-package
          cp -r src public scripts package.json package-lock.json tsconfig.json deploy-package/
          cd deploy-package && npm ci --omit=dev
          echo "Deploy package size: $(du -sh . | cut -f1)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: deploy-package
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: 'false'

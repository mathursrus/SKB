name: Deploy to Azure App Service

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: skb-waitlist
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://skb-waitlist.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Prepare deploy package
        run: |
          mkdir -p deploy-package
          cp -r src public scripts package.json package-lock.json tsconfig.json deploy-package/
          cd deploy-package && npm ci --omit=dev
          echo "Deploy package size: $(du -sh . | cut -f1)"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: deploy-package
        env:
          SCM_DO_BUILD_DURING_DEPLOYMENT: 'false'

      # Project rule #8 — authenticated post-deploy smoke is mandatory.
      # Signs up a throwaway owner against the freshly-deployed app, hits
      # /staff and /queue/state with cookie auth, asserts success-shape
      # responses, then deletes the throwaway. The deploy is NOT successful
      # until this passes. See scripts/post-deploy-smoke.sh for details and
      # docs/retrospectives/sid.mathur@gmail.com-issue-93-staff-503-postmortem.md
      # for the failure pattern this prevents.
      - name: Wait for App Service warm-up
        run: |
          # Azure App Service can take ~20-40s after deploy to fully cycle the
          # new build. Poll /health until it responds 200 (or fail after 90s).
          deadline=$((SECONDS + 90))
          until curl -sS --max-time 5 "https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health" -o /dev/null -w '%{http_code}' | grep -q '^200$'; do
            if [ $SECONDS -ge $deadline ]; then
              echo "App Service did not respond 200 on /health within 90s"
              exit 1
            fi
            sleep 3
          done
          echo "App Service warm"

      - name: Post-deploy authenticated smoke
        env:
          SMOKE_BASE_URL: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net
          SMOKE_OWNER_EMAIL: smoke@example.test
          SMOKE_OWNER_PASSWORD: ${{ secrets.SMOKE_OWNER_PASSWORD }}
          SMOKE_TENANT_SLUG: smoke-test
        run: bash scripts/post-deploy-smoke.sh

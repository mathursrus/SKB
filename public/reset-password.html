<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Set a new password — SKB Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    background: linear-gradient(160deg, #fff7ec 0%, #f3faf7 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    color: #1c1917;
  }
  .wrap { width: 100%; max-width: 420px; }
  .card { background: #ffffff; border-radius: 18px; padding: 32px 28px; box-shadow: 0 10px 40px rgba(17, 24, 28, 0.08); }
  h1 { margin: 0 0 6px; font-family: 'Archivo', sans-serif; font-weight: 600; font-size: 26px; }
  p.muted { margin: 0 0 24px; color: #78716c; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  input { width: 100%; font-size: 16px; padding: 11px 12px; border: 1px solid #d6d3d1; border-radius: 10px; margin-bottom: 16px; font-family: inherit; }
  input:focus { outline: 2px solid #1f6a5d; outline-offset: 1px; border-color: #1f6a5d; }
  button.primary {
    width: 100%; font-family: 'Archivo', sans-serif; font-size: 15px; font-weight: 600;
    padding: 13px 16px; border: 0; border-radius: 10px; background: #1f6a5d; color: white; cursor: pointer;
  }
  button.primary:hover { background: #175049; }
  .error { background: #fee2e2; color: #991b1b; padding: 10px 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
  .error.visible { display: block; }
  .ok { background: #dcfce7; color: #166534; padding: 10px 12px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
  .ok.visible { display: block; }
  .hint { font-size: 12px; color: #78716c; margin-top: -8px; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Set a new password</h1>
    <p class="muted">Choose a password that's at least 10 characters long. You'll sign in with it right away.</p>
    <div class="error" id="err"></div>
    <div class="ok" id="ok"></div>
    <form id="reset-form">
      <label for="password">New password</label>
      <input type="password" id="password" required minlength="10" autocomplete="new-password" autofocus />
      <div class="hint">At least 10 characters.</div>
      <label for="password2">Confirm password</label>
      <input type="password" id="password2" required minlength="10" autocomplete="new-password" />
      <button type="submit" class="primary">Save new password</button>
    </form>
  </div>
</div>

<script>
(function () {
  var err = document.getElementById('err');
  var ok = document.getElementById('ok');
  function show(el, msg) { el.textContent = msg; el.classList.add('visible'); }
  function hide(el) { el.classList.remove('visible'); }

  var params = new URLSearchParams(window.location.search);
  var token = params.get('t');

  document.getElementById('reset-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    hide(err); hide(ok);
    if (!token) { show(err, 'This reset link is missing its token. Request a new one from /login.'); return; }
    var p1 = document.getElementById('password').value;
    var p2 = document.getElementById('password2').value;
    if (p1 !== p2) { show(err, 'Passwords do not match.'); return; }
    if (p1.length < 10) { show(err, 'Password must be at least 10 characters.'); return; }
    try {
      var res = await fetch('/api/password-reset/confirm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: p1 }),
      });
      var data = null;
      try { data = await res.json(); } catch (e) { /* fall through */ }
      if (!res.ok) {
        if (res.status === 401) { show(err, 'This link has expired or was already used. Request a new one from /login.'); }
        else { show(err, (data && data.error) || 'Could not reset password.'); }
        return;
      }
      show(ok, 'Password saved. Redirecting to sign in…');
      setTimeout(function () { window.location = '/login'; }, 1200);
    } catch (ex) {
      show(err, 'Could not reach server. Try again.');
    }
  });
})();
</script>
</body>
</html>

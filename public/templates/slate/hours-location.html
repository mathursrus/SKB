<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hours &amp; Location — {{brandName}}</title>
    <link rel="stylesheet" href="templates/slate/site.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+SemiCondensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="slate-site">
    <div class="slate-banner">Kitchen open until 10:00 PM · Walk-ins welcome</div>

    <header class="slate-header">
        <div>
            <div class="slate-brand-name" id="brand-name">{{brandName}}</div>
            <div class="slate-brand-tag">Modern cuisine</div>
        </div>
        <nav class="slate-nav" aria-label="Primary navigation">
            <ul>
                <li><a href="./">Home</a></li>
                <li><a href="./menu">Menu</a></li>
                <li><a href="./about">About</a></li>
                <li><a href="./hours" aria-current="page">Hours &amp; Location</a></li>
                <li><a href="./contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="slate-section">
        <h2>Hours</h2>
        <table class="slate-hours-table">
            <tbody id="hours-table-body">
                <tr><td colspan="2">Hours coming soon.</td></tr>
            </tbody>
        </table>

        <h2>Find Us</h2>
        <div class="slate-map-block">
            <iframe id="map-embed" title="Map"
                src=""
                loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <a id="map-cta" class="slate-cta ghost" href="#">Open in Google Maps</a>

        <div class="slate-address" id="hours-address-lines">
            <div class="line"><strong id="address-brand">{{brandName}}</strong></div>
            <div class="line">Address coming soon</div>
        </div>
    </section>

    <footer class="slate-footer">
        <div class="fnav">
            <a href="./">Home</a>
            <a href="./menu">Menu</a>
            <a href="./about">About</a>
            <a href="./hours">Hours &amp; Location</a>
            <a href="./contact">Contact</a>
        </div>
        <div>© 2026 {{brandName}}</div>
    </footer>

    <script src="site-config.js"></script>
</body>
</html>
